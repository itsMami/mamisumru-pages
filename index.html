<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doğum Günün Kutlu Olsun Birtanem</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #f4ede8;
      background:
        radial-gradient(circle at top left, rgba(123, 43, 66, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(181, 116, 94, 0.14), transparent 26%),
        linear-gradient(135deg, #0d0a0b, #151012 42%, #1d1518 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.30;
      animation: floatGlow 9s ease-in-out infinite;
    }

    body::before {
      top: -100px;
      left: -80px;
      background: rgba(143, 77, 98, 0.35);
    }

    body::after {
      right: -100px;
      bottom: -120px;
      background: rgba(170, 108, 88, 0.22);
      animation-delay: 2.5s;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(18px, -10px) scale(1.05); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .sparkles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 244, 235, 0.85);
      box-shadow: 0 0 10px rgba(255, 231, 219, 0.55);
      animation: sparkleFloat linear infinite;
    }

    .sparkle:nth-child(1)  { left: 8%;  top: 88%; animation-duration: 14s; animation-delay: 0s;   opacity: 0.55; }
    .sparkle:nth-child(2)  { left: 18%; top: 96%; animation-duration: 18s; animation-delay: 2s;   opacity: 0.45; }
    .sparkle:nth-child(3)  { left: 28%; top: 91%; animation-duration: 16s; animation-delay: 4s;   opacity: 0.60; }
    .sparkle:nth-child(4)  { left: 37%; top: 94%; animation-duration: 20s; animation-delay: 1s;   opacity: 0.35; }
    .sparkle:nth-child(5)  { left: 49%; top: 89%; animation-duration: 17s; animation-delay: 5s;   opacity: 0.55; }
    .sparkle:nth-child(6)  { left: 58%; top: 97%; animation-duration: 15s; animation-delay: 3s;   opacity: 0.45; }
    .sparkle:nth-child(7)  { left: 67%; top: 92%; animation-duration: 19s; animation-delay: 6s;   opacity: 0.50; }
    .sparkle:nth-child(8)  { left: 76%; top: 95%; animation-duration: 13s; animation-delay: 2.5s; opacity: 0.60; }
    .sparkle:nth-child(9)  { left: 85%; top: 90%; animation-duration: 21s; animation-delay: 4.5s; opacity: 0.35; }
    .sparkle:nth-child(10) { left: 93%; top: 98%; animation-duration: 16s; animation-delay: 1.5s; opacity: 0.50; }

    @keyframes sparkleFloat {
      0%   { transform: translateY(0) scale(0.8); opacity: 0; }
      10%  { opacity: 0.55; }
      50%  { opacity: 0.85; }
      100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }

    .card {
      width: 100%;
      max-width: 1180px;
      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      gap: 28px;
      align-items: center;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 28px;
      box-shadow: 0 20px 70px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    .text-box { padding: 10px 8px; }

    .eyebrow {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #cfb8ab;
      margin-bottom: 18px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 60px;
      line-height: 1.04;
      margin: 0 0 18px 0;
      color: #fff7f1;
      text-shadow: 0 2px 18px rgba(0,0,0,0.22);
    }

    .subtitle {
      font-size: 20px;
      line-height: 1.75;
      color: #dccfc7;
      max-width: 560px;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 14px;
      font-weight: 700;
      transition: 0.2s ease;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8f4d62, #6f364b);
      color: #fffaf7;
      box-shadow: 0 10px 25px rgba(111, 54, 75, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .image-box { padding: 10px; }

    .image-frame {
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 35px rgba(0,0,0,0.28);
    }

    .image-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.00) 35%,
        rgba(0,0,0,0.10)
      );
      pointer-events: none;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 720px;
      object-fit: cover;
    }

    .footer-note {
      margin-top: 22px;
      font-size: 14px;
      color: #bbaaa1;
    }

    .music-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      background: rgba(20,20,20,0.78);
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      font-weight: 700;
    }

    @media (max-width: 960px) {
      .card { grid-template-columns: 1fr; }
      h1 { font-size: 42px; }
      .subtitle { font-size: 18px; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 18px 12px; }
      .card { padding: 18px; border-radius: 22px; }
      h1 { font-size: 34px; }
      .subtitle { font-size: 16px; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="sparkles">
    <span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span>
    <span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="text-box">
        <div class="eyebrow">1 Mayıs • Sumrum</div>
        <h1>Doğum Günün Kutlu Olsun Birtanem</h1>
        <div class="subtitle">
          İyi ki varsın, iyi ki benimlesin.<br>
          Seninle her an daha güzel, daha derin ve daha özel.
        </div>
        <div class="buttons">
          <a class="btn btn-primary" href="/upload">Fotoğraflar</a>
        </div>
        <div class="footer-note">
          Seni Seviyorum.
        </div>
      </div>

      <div class="image-box">
        <div class="image-frame">
          <img src="./hero.jpg" alt="Mami ve Sumru">
        </div>
      </div>
    </div>
  </div>

  <audio id="bgMusic" autoplay loop>
    <source src="./music.mp3" type="audio/mpeg">
  </audio>

  <button id="musicToggle" class="music-btn">Müziği Aç</button>

  <script>
    const music = document.getElementById("bgMusic");
    const toggle = document.getElementById("musicToggle");

    async function tryPlayMusic() {
      try {
        await music.play();
        toggle.textContent = "Müziği Kapat";
      } catch (e) {
        toggle.textContent = "Müziği Aç";
      }
    }

    toggle.addEventListener("click", async () => {
      if (music.paused) {
        try {
          await music.play();
          toggle.textContent = "Müziği Kapat";
        } catch (e) {
          toggle.textContent = "Müziği Aç";
        }
      } else {
        music.pause();
        toggle.textContent = "Müziği Aç";
      }
    });

    window.addEventListener("load", tryPlayMusic);
  </script>
</body>
</html>
