<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fotoğraf Paneli</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      max-width: 1280px;
      margin: 0 auto;
      padding: 34px 20px 42px 20px;
      color: #f4ede8;
      background:
        radial-gradient(circle at top left, rgba(123, 43, 66, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(181, 116, 94, 0.14), transparent 28%),
        linear-gradient(135deg, #0d0a0b, #151012 42%, #1d1518 100%);
      min-height: 100vh;
    }
    .page-top { margin-bottom: 26px; position: relative; }
    .title-wrap { position: relative; display: inline-block; }
    .title-wrap::before {
      content: "";
      position: absolute;
      left: -18px;
      top: -16px;
      width: 220px;
      height: 95px;
      background: radial-gradient(circle, rgba(143, 77, 98, 0.22), rgba(143, 77, 98, 0.00) 68%);
      filter: blur(14px);
      z-index: 0;
      pointer-events: none;
    }
    h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 46px;
      font-weight: 600;
      color: #fff7f1;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 16px rgba(0,0,0,0.24);
    }
    .top-note {
      font-size: 14px;
      color: #cfc1b8;
      margin-bottom: 0;
      line-height: 1.6;
    }
    .box {
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      margin-top: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.035));
      box-shadow: 0 18px 44px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      animation: boxFade 0.7s ease;
      animation-fill-mode: both;
    }
    @keyframes pageFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes boxFade {
      0% { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .page-top { animation: pageFade 0.7s ease; }
    .box:nth-of-type(1) { animation-delay: 0.08s; }
    .box:nth-of-type(2) { animation-delay: 0.16s; }
    .box:nth-of-type(3) { animation-delay: 0.24s; }
    .msg {
      margin: 18px 0 0 0;
      padding: 15px 16px;
      background: rgba(255,255,255,0.08);
      color: #f6ebe4;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }
    .row {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: end;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    label {
      font-size: 14px;
      color: #dbcfc7;
      font-weight: 700;
    }
    input[type="number"] {
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: #fff7f1;
      width: 210px;
      outline: none;
    }
    input[type="file"] { color: #e7dad2; }
    input[type="file"]::file-selector-button {
      margin-right: 12px;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      color: #fff4ee;
      cursor: pointer;
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.18s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.04); }
    .upload-btn {
      background: linear-gradient(135deg, #8f4d62, #6f364b);
      color: #fffaf7;
    }
    .save-btn {
      background: linear-gradient(135deg, #70535d, #5a4149);
      color: #fffaf7;
    }
    .delete-btn {
      background: linear-gradient(135deg, #a13f46, #7f2e34);
      color: white;
      padding: 9px 12px;
      width: 100%;
    }
    .replace-btn {
      background: linear-gradient(135deg, #70535d, #5a4149);
      color: #fffaf7;
      width: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
      margin-top: 18px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
      overflow: hidden;
      padding: 13px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 16px 30px rgba(0,0,0,0.24);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }
    .card:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(219, 176, 151, 0.20);
      box-shadow: 0 22px 38px rgba(0,0,0,0.30);
    }
    .card.dragging { opacity: 0.45; transform: scale(0.98); }
    .card.drag-over { outline: 3px dashed rgba(219, 176, 151, 0.85); outline-offset: 2px; }
    .thumb-wrap {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(0,0,0,0.16), rgba(0,0,0,0.24));
      border-radius: 14px;
      overflow: hidden;
    }
    .thumb {
      max-width: 100%;
      max-height: 100%;
      display: block;
      pointer-events: none;
    }
    .filename {
      margin-top: 13px;
      font-size: 14px;
      word-break: break-word;
      min-height: 38px;
      color: #f1e7e1;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(219, 176, 151, 0.16);
      color: #ffe8d9;
      border: 1px solid rgba(219, 176, 151, 0.25);
    }
    .helper, .hint {
      font-size: 13px;
      color: #bbaaa1;
      margin-top: 10px;
      line-height: 1.6;
    }
    .section-title {
      margin: 0;
      font-size: 24px;
      color: #fff4ed;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
    }
    @media (max-width: 700px) {
      body { padding: 20px 14px 30px 14px; }
      h1 { font-size: 34px; }
      .box { padding: 17px; border-radius: 18px; }
      button, input[type="number"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-top">
    <div class="title-wrap">
      <h1>Fotoğraf Paneli</h1>
    </div>
    <p class="top-note">Yüklediğin fotoğraflar bu sitede kalıcak, cihaz açılınca internet üstünden kendini güncellicek <3.</p>
  </div>

  <div id="message"></div>

  <div class="box">
  <strong>Şu anda gösterilen:</strong> <span id="currentDisplay">Bilinmiyor</span>

  <div id="currentPreviewWrap" style="margin-top:14px; display:none;">
    <div class="thumb-wrap" style="max-width:320px;">
      <img id="currentPreview" class="thumb" src="" alt="Current display preview">
    </div>
  </div>

  <div style="margin-top:14px;">
    <strong>Sıradaki görsel:</strong> <span id="nextImageCountdown">--:--</span>
  </div>

  <div class="hint">Kartları sürükleyip sırala, sonra sıralamayı kaydet.</div>
</div>

  <div class="box">
    <div class="row">
      <form id="uploadForm">
        <div class="field">
          <label>Fotoğraf yükle</label>
          <input type="file" id="fileInput" name="files" multiple required>
        </div>
        <button class="upload-btn" type="submit">Yükle</button>
      </form>

      <form id="timerForm">
        <div class="field">
          <label>Geçiş süresi (saniye)</label>
          <input type="number" id="refreshTime" min="1" step="1" required>
        </div>
        <button class="save-btn" type="submit">Süreyi Kaydet</button>
      </form>
    </div>
    <div class="helper">Örnek: 300 = 5 dakika, 600 = 10 dakika.</div>
  </div>

  <div class="box">
    <div class="row" style="justify-content: space-between; align-items: center;">
      <h3 class="section-title">Görseller</h3>
      <button class="save-btn" id="saveOrderBtn" type="button">Sıralamayı Kaydet</button>
    </div>
    <div class="grid" id="imageGrid"></div>
  </div>

  <script>
    let currentImages = [];
    let currentDisplay = "";
    let refreshTimeSeconds = 600;
    let countdownRemaining = 600;
    let countdownInterval = null;
    let lastSeenDisplay = "";

    function showMessage(text, isError = false) {
      const el = document.getElementById("message");
      el.innerHTML = `<div class="msg" style="${isError ? 'border-color: rgba(200,80,80,0.35);' : ''}">${text}</div>`;
    }

    function formatCountdown(seconds) {
      const safe = Math.max(0, Math.floor(seconds));
      const mins = String(Math.floor(safe / 60)).padStart(2, "0");
      const secs = String(safe % 60).padStart(2, "0");
      return `${mins}:${secs}`;
    }
    
    function updateCountdownUI() {
      document.getElementById("nextImageCountdown").textContent = formatCountdown(countdownRemaining);
    }
    
    function startCountdown(seconds) {
      refreshTimeSeconds = seconds;
      countdownRemaining = seconds;
    
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
    
      updateCountdownUI();
    
      countdownInterval = setInterval(() => {
        countdownRemaining -= 1;
    
        if (countdownRemaining < 0) {
          countdownRemaining = 0;
        }
    
        updateCountdownUI();
      }, 1000);
    }
    async function loadState() {
      const res = await fetch("/api/state");
      const data = await res.json();
    
      if (!data.ok) {
        showMessage(data.error || "Durum yüklenemedi", true);
        return;
      }
    
      currentImages = data.images || [];
      currentDisplay = data.current_display || "";
      document.getElementById("refreshTime").value = data.refresh_time || 600;
    
      const currentImage = currentImages.find(img => img.local_name === currentDisplay);
    
      document.getElementById("currentDisplay").textContent =
        currentImage ? currentImage.filename : (currentDisplay || "Bilinmiyor");
    
      const previewWrap = document.getElementById("currentPreviewWrap");
      const previewImg = document.getElementById("currentPreview");
    
      if (currentImage) {
        previewImg.src = currentImage.image_url;
        previewWrap.style.display = "block";
      } else {
        previewImg.src = "";
        previewWrap.style.display = "none";
      }
    
      const incomingRefresh = Number(data.refresh_time || 600);
    
      if (lastSeenDisplay !== currentDisplay || refreshTimeSeconds !== incomingRefresh) {
        startCountdown(incomingRefresh);
        lastSeenDisplay = currentDisplay;
      }
    
      renderImages();
    }

    function renderImages() {
      const grid = document.getElementById("imageGrid");
      grid.innerHTML = "";

      if (!currentImages.length) {
        grid.innerHTML = "<p>Henüz görsel yok</p>";
        return;
      }

      currentImages.forEach((image) => {
        const card = document.createElement("div");
        card.className = image.local_name === currentDisplay ? "card current" : "card";
        card.draggable = true;
        card.dataset.id = image.id;

        card.innerHTML = `
          <div class="thumb-wrap">
            <img class="thumb" src="${image.image_url}" alt="${image.filename}">
          </div>
          <div class="filename">${image.filename}<br><span style="opacity:.65;font-size:12px;">${image.local_name}</span></div>
        ${image.local_name === currentDisplay ? '<div class="badge">Şu an gösteriliyor</div>' : ''}
          <div class="actions">
            <button class="save-btn replace-btn" type="button" data-id="${image.id}">Değiştir</button>
            <button class="delete-btn" type="button" data-id="${image.id}">Sil</button>
          </div>
        `;

        grid.appendChild(card);
      });

      setupDragAndDrop();
      setupDeleteButtons();
      setupReplaceButtons();
    }

    function setupDeleteButtons() {
      document.querySelectorAll(".delete-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.dataset.id);
          const res = await fetch("/api/delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id })
          });
          const data = await res.json();

          if (!data.ok) {
            showMessage(data.error || "Silinemedi", true);
            return;
          }

          showMessage("Görsel silindi.");
          await loadState();
        });
      });
    }

    function setupReplaceButtons() {
      document.querySelectorAll(".replace-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const id = Number(btn.dataset.id);

          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/*";
    
          input.onchange = async () => {
            if (!input.files.length) return;
    
            const fd = new FormData();
            fd.append("id", String(id));
            fd.append("file", input.files[0]);
    
            const res = await fetch("/api/replace", {
              method: "POST",
              body: fd
            });
    
            const data = await res.json();
    
            if (!data.ok) {
              showMessage(data.error || "Görsel değiştirilemedi", true);
              return;
            }
    
            showMessage("Görsel güncellendi.");
            await loadState();
          };
    
          input.click();
    });
  });
}
let isDraggingNow = false;

function setupDragAndDrop() {
  const grid = document.getElementById("imageGrid");
  let draggedCard = null;
  const cards = grid.querySelectorAll(".card");

  cards.forEach(card => {
    card.addEventListener("dragstart", () => {
      draggedCard = card;
      isDraggingNow = true;
      card.classList.add("dragging");
    });

    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      cards.forEach(c => c.classList.remove("drag-over"));
      isDraggingNow = false;
    });

    card.addEventListener("dragover", (e) => e.preventDefault());

    card.addEventListener("dragenter", (e) => {
      e.preventDefault();
      if (card !== draggedCard) card.classList.add("drag-over");
    });

    card.addEventListener("dragleave", () => {
      card.classList.remove("drag-over");
    });

    card.addEventListener("drop", (e) => {
      e.preventDefault();
      card.classList.remove("drag-over");

      if (!draggedCard || draggedCard === card) return;

      const allCards = [...grid.querySelectorAll(".card")];
      const draggedIndex = allCards.indexOf(draggedCard);
      const targetIndex = allCards.indexOf(card);

      if (draggedIndex < targetIndex) {
        card.after(draggedCard);
      } else {
        card.before(draggedCard);
      }
    });
  });
}

loadState();
setInterval(() => {
  if (!isDraggingNow) {
    loadState();
  }
}, 30000);
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("fileInput");
      if (!input.files.length) return;

      const fd = new FormData();
      [...input.files].forEach(file => fd.append("files", file));

      const res = await fetch("/api/upload", {
        method: "POST",
        body: fd
      });

      const data = await res.json();

      if (!data.ok) {
        showMessage(data.error || "Yükleme başarısız", true);
        return;
      }

      input.value = "";
      showMessage("Yükleme tamamlandı.");
      await loadState();
    });

    document.getElementById("timerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const refreshTime = Number(document.getElementById("refreshTime").value);

      const res = await fetch("/api/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_time: refreshTime })
      });

      const data = await res.json();

      if (!data.ok) {
        showMessage(data.error || "Süre kaydedilemedi", true);
        return;
      }

      showMessage("Geçiş süresi güncellendi.");
    });

    document.getElementById("saveOrderBtn").addEventListener("click", async () => {
      const ids = [...document.querySelectorAll("#imageGrid .card")].map(card => Number(card.dataset.id));

      const res = await fetch("/api/order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order: ids })
      });

      const data = await res.json();

      if (!data.ok) {
        showMessage(data.error || "Sıralama kaydedilemedi", true);
        return;
      }

      showMessage("Sıralama kaydedildi.");
      await loadState();
    });

    loadState();
    setInterval(loadState,30000);
  </script>
</body>
</html>
