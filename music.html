<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Büyülü Müzik Odası</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: #f4ead7;
      background:
        radial-gradient(circle at top left, rgba(211, 156, 65, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(119, 51, 34, 0.16), transparent 24%),
        linear-gradient(135deg, #0a0c10 0%, #13161d 38%, #1b1512 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .back-row { margin-bottom: 18px; }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: #f9eed7;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      font-weight: 700;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 26px;
      align-items: stretch;
      background: linear-gradient(180deg, rgba(38, 29, 22, 0.78), rgba(18, 20, 27, 0.72));
      border: 1px solid rgba(209, 167, 90, 0.14);
      border-radius: 30px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,236,186,0.03);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #d9b36c;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 48px;
      line-height: 1.05;
      color: #fff0d2;
    }

    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.8;
      color: #ddcfb7;
      max-width: 580px;
      margin-bottom: 20px;
    }

    .player-card,
    .playlist-card {
      background: linear-gradient(180deg, rgba(255,244,216,0.04), rgba(255,244,216,0.02));
      border: 1px solid rgba(214, 177, 92, 0.10);
      border-radius: 22px;
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .player-card {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 20px;
      align-items: center;
    }

    .record-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #3d2b1a 0 18px, #8e6833 18px 24px, #21160f 24px 100%);
      box-shadow: inset 0 0 0 1px rgba(255,222,166,0.08), 0 12px 24px rgba(0,0,0,0.28);
      margin: 0 auto;
    }

    .record-wrap.spinning { animation: spin 5s linear infinite; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .track-name { font-size: 28px; color: #fff0d2; margin-bottom: 10px; word-break: break-word; }

    .track-meta {
      font-family: Arial, sans-serif;
      color: #d2c1a4;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #9a712f, #e0bf7a);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: #cdbb9c;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0 16px;
    }

    .control-btn {
      border: 1px solid rgba(255, 220, 164, 0.10);
      background: linear-gradient(135deg, #8f6a2d, #6e4c1e);
      color: #fff7eb;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 14px;
      min-width: 100px;
    }

    .control-btn.secondary { background: linear-gradient(135deg, #5f4b2f, #473521); }

    .volume-row {
      display: flex;
      gap: 12px;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    input[type="range"] { width: 100%; }

    .section-title { margin: 0 0 14px 0; font-size: 28px; color: #fff0d2; }

    .playlist-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 540px;
      overflow: auto;
    }

    .song-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .song-item.active {
      border-color: rgba(214, 177, 92, 0.34);
      box-shadow: 0 0 0 2px rgba(214, 177, 92, 0.08);
      background: rgba(214, 177, 92, 0.06);
    }

    .song-name {
      font-family: Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #f4e8d8;
      word-break: break-word;
    }

    .song-action {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: #fff4e3;
      cursor: pointer;
      font-weight: 700;
    }

    .status-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #eadcc7;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .player-card { grid-template-columns: 1fr; text-align: center; }
    }

    @media (max-width: 560px) {
      h1 { font-size: 34px; }
      .section-title { font-size: 24px; }
      .page { padding: 18px 12px 34px; }
      .hero { padding: 18px; border-radius: 24px; }
      .control-btn { min-width: calc(50% - 4px); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="back-row">
      <a href="/" class="back-link">← Ana Sayfa</a>
    </div>

    <div class="hero">
      <div>
        <div class="eyebrow">Magical Memories</div>
        <h1>Büyülü Müzik Odası</h1>
        <div class="subtitle">
          Hatıraları melodilere dönüştürmek için hazırlandı.
        </div>

        <div class="player-card">
          <div class="record-wrap" id="recordDisc"></div>

          <div>
            <div class="track-name" id="currentTrackName">Henüz şarkı seçilmedi</div>
            <div class="track-meta" id="currentTrackMeta">Durum bekleniyor...</div>

            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-row">
              <span id="timeCurrent">0:00</span>
              <span id="timeTotal">0:00</span>
            </div>

            <div class="controls">
              <button class="control-btn secondary" id="prevBtn">⏮</button>
              <button class="control-btn" id="playBtn">▶</button>
              <button class="control-btn secondary" id="pauseBtn">⏸</button>
              <button class="control-btn secondary" id="nextBtn">⏭</button>
            </div>

            <div class="volume-row">
              <input type="range" id="volumeSlider" min="0" max="100" step="1" value="70">
              <span id="volumeValue">70</span>
            </div>

            <div class="status-box" id="statusBox">Sunucudan durum bekleniyor...</div>
          </div>
        </div>
      </div>

      <div>
        <div class="playlist-card">
          <h2 class="section-title">Çalma Listesi</h2>
          <div class="playlist-list" id="playlistList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const playlistList = document.getElementById("playlistList");
    const currentTrackName = document.getElementById("currentTrackName");
    const currentTrackMeta = document.getElementById("currentTrackMeta");
    const statusBox = document.getElementById("statusBox");
    const progressFill = document.getElementById("progressFill");
    const timeCurrent = document.getElementById("timeCurrent");
    const timeTotal = document.getElementById("timeTotal");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeValue = document.getElementById("volumeValue");
    const recordDisc = document.getElementById("recordDisc");

    function formatTime(seconds) {
      const s = Number(seconds || 0);
      if (!Number.isFinite(s) || s < 0) return "0:00";
      const mins = Math.floor(s / 60);
      const secs = Math.floor(s % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    async function loadState() {
      const res = await fetch("/api/music/state");
      const data = await res.json();

      if (!data.ok) {
        statusBox.textContent = data.error || "Durum alınamadı.";
        return;
      }

      const playlist = data.playlist || [];
      const state = data.state || {};
      const activeIndex = Number(state.current_index || 0);

      playlistList.innerHTML = "";

      if (!playlist.length) {
        playlistList.innerHTML = '<div class="song-item"><div class="song-name">Henüz müzik yok</div></div>';
      } else {
        playlist.forEach((name, index) => {
          const item = document.createElement("div");
          item.className = index === activeIndex ? "song-item active" : "song-item";
          item.innerHTML = `
            <div class="song-name">${name}</div>
            <button class="song-action" data-index="${index}">Seç</button>
          `;
          playlistList.appendChild(item);
        });

        document.querySelectorAll(".song-action").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const index = Number(btn.dataset.index);
            await sendCommand("select", { index });
          });
        });
      }

      currentTrackName.textContent = state.current_name || "Henüz şarkı seçilmedi";
      currentTrackMeta.textContent = state.running
        ? (state.pause ? "Durum: Duraklatıldı" : "Durum: Çalıyor")
        : "Durum: Hazır";

      const duration = Number(state.duration || 0);
      const timePos = Number(state.time_pos || 0);
      const percent = duration > 0 ? Math.min(100, (timePos / duration) * 100) : 0;

      progressFill.style.width = `${percent}%`;
      timeCurrent.textContent = formatTime(timePos);
      timeTotal.textContent = formatTime(duration);

      const vol = Math.round(Number(state.volume || 70));
      volumeSlider.value = vol;
      volumeValue.textContent = vol;

      statusBox.textContent = state.running
        ? (state.pause ? "Müzik duraklatıldı." : "Büyülü kayıt şu anda çalıyor.")
        : "Oynatmaya hazır.";

      if (state.running && !state.pause) {
        recordDisc.classList.add("spinning");
      } else {
        recordDisc.classList.remove("spinning");
      }
    }

    async function sendCommand(command, payload = {}) {
      await fetch("/api/music/command", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command, payload })
      });
      setTimeout(loadState, 700);
    }

    document.getElementById("playBtn").addEventListener("click", () => sendCommand("play"));
    document.getElementById("pauseBtn").addEventListener("click", () => sendCommand("pause"));
    document.getElementById("nextBtn").addEventListener("click", () => sendCommand("next"));
    document.getElementById("prevBtn").addEventListener("click", () => sendCommand("prev"));

    volumeSlider.addEventListener("input", () => {
      volumeValue.textContent = volumeSlider.value;
    });

    volumeSlider.addEventListener("change", () => {
      sendCommand("volume", { volume: Number(volumeSlider.value) });
    });

    loadState();
    setInterval(loadState, 3000);
  </script>
</body>
</html>
