<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Büyülü Müzik Odası</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #06080e;
      --bg-2: #0c1119;
      --bg-3: #130f0d;
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);
      --gold: #d7a54a;
      --gold-2: #f0c66d;
      --gold-soft: rgba(215, 165, 74, 0.18);
      --text: #f7eddc;
      --muted: #c7b8a1;
      --muted-2: #a89a86;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(220, 163, 70, 0.10), transparent 22%),
        radial-gradient(circle at bottom center, rgba(225, 169, 73, 0.08), transparent 18%),
        radial-gradient(circle at bottom right, rgba(121, 52, 35, 0.14), transparent 22%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 22px 18px 250px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff3da;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    .hero {
      padding: 24px 22px 18px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(33, 24, 18, 0.72), rgba(14, 16, 22, 0.62));
      border: 1px solid rgba(215, 165, 74, 0.14);
      box-shadow:
        0 24px 70px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-2);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 50px;
      line-height: 1.02;
      color: #fff0d2;
    }

    .subtitle {
      margin: 0 0 20px 0;
      max-width: 760px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      line-height: 1.8;
      color: #d7c9b1;
    }

    .playlist-shell {
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.015));
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .playlist-header {
      display: grid;
      grid-template-columns: 64px 1fr 170px 110px;
      gap: 12px;
      align-items: center;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line-soft);
      font-family: Arial, sans-serif;
      color: var(--muted-2);
      font-size: 13px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .playlist-list {
      max-height: calc(100vh - 350px);
      overflow: auto;
    }

    .song-row {
      position: relative;
      display: grid;
      grid-template-columns: 64px 1fr 170px 110px;
      gap: 12px;
      align-items: center;
      min-height: 74px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,0.045);
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .song-row:hover {
      background: rgba(255,255,255,0.03);
    }

    .song-row.active {
      background:
        linear-gradient(90deg, rgba(215,165,74,0.05), rgba(255,255,255,0.01) 20%, rgba(215,165,74,0.04) 80%, rgba(255,255,255,0.01));
      box-shadow:
        inset 0 1px 0 rgba(215,165,74,0.22),
        inset 0 -1px 0 rgba(215,165,74,0.18),
        0 0 18px rgba(215,165,74,0.08);
    }

    .song-row.active::before,
    .song-row.active::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(240,198,109,0.95), transparent);
      box-shadow: 0 0 12px rgba(240,198,109,0.35);
    }

    .song-row.active::before { top: 0; }
    .song-row.active::after { bottom: 0; }

    .col-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .row-icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: #fff2db;
      font-size: 18px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .row-icon-btn:hover {
      transform: translateY(-1px) scale(1.03);
      filter: brightness(1.08);
    }

    .song-row.active .row-icon-btn {
      background: rgba(215,165,74,0.10);
      border-color: rgba(215,165,74,0.22);
      box-shadow: 0 0 16px rgba(215,165,74,0.10);
    }

    .song-title {
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #f7eddc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-meta {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: var(--muted);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-duration {
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: #e4d0ac;
      text-align: right;
    }

    .mini-eq {
      display: inline-flex;
      align-items: end;
      gap: 4px;
      height: 18px;
    }

    .mini-eq span {
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe2a0, #d59d3d);
      box-shadow: 0 0 10px rgba(240,198,109,0.30);
      animation: eqBounce 1.1s ease-in-out infinite;
    }

    .mini-eq span:nth-child(1) { height: 10px; animation-delay: 0s; }
    .mini-eq span:nth-child(2) { height: 18px; animation-delay: 0.12s; }
    .mini-eq span:nth-child(3) { height: 13px; animation-delay: 0.24s; }
    .mini-eq span:nth-child(4) { height: 16px; animation-delay: 0.36s; }

    @keyframes eqBounce {
      0%, 100% { transform: scaleY(0.7); opacity: 0.8; }
      50% { transform: scaleY(1.15); opacity: 1; }
    }

    .bottom-player {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(980px, calc(100vw - 40px));
      padding: 18px 22px 18px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(28,22,18,.88), rgba(12,14,20,.92));
      border: 1px solid rgba(214, 177, 92, 0.14);
      box-shadow:
        0 24px 60px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.03);
      backdrop-filter: blur(14px);
      z-index: 40;
    }

    .bottom-player-inner {
      width: 100%;
    }

    .bottom-track-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #f5e7c8;
      margin-bottom: 4px;
    }

    .bottom-track-meta {
      text-align: center;
      font-size: 13px;
      color: #bda882;
      margin-bottom: 14px;
      font-family: Arial, sans-serif;
    }

    .bottom-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .ctrl-btn {
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 18px;
      cursor: pointer;
      color: #fff2d6;
      font-size: 24px;
      background: linear-gradient(135deg, #7b5a25, #a97a2f);
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: transform .15s ease, filter .15s ease;
    }

    .ctrl-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .ctrl-btn.play-main {
      width: 72px;
      height: 72px;
      font-size: 30px;
      border-radius: 22px;
    }

    .progress-wrap {
      margin-bottom: 6px;
    }

    .progress-bar {
      position: relative;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.10);
    }

    .progress-fill {
      position: relative;
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #d6a44a, #f0ca78);
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      top: 0;
      right: -24px;
      width: 42px;
      height: 100%;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,245,214,0.18) 45%,
        rgba(255,255,255,0) 100%
      );
      transform: skewX(-20deg);
      opacity: 0;
    }

    .progress-fill.shimmering::after {
      animation: progressShimmer 2.2s linear infinite;
      opacity: 1;
    }

    @keyframes progressShimmer {
      0% {
        transform: translateX(-36px) skewX(-20deg);
        opacity: 0.2;
      }
      50% {
        opacity: 0.9;
      }
      100% {
        transform: translateX(120px) skewX(-20deg);
        opacity: 0.2;
      }
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 12px;
      color: #d4c09a;
      font-family: Arial, sans-serif;
    }

    .volume-strip {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .vol-btn {
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      color: #f7ead0;
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      transition: 0.18s ease;
    }

    .vol-btn:hover {
      background: rgba(255,255,255,.12);
    }

    .volume-slider {
      flex: 1;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d6a44a;
      cursor: pointer;
      border: 0;
    }

    .volume-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #d6a44a;
      cursor: pointer;
      border: 0;
    }

    @media (max-width: 980px) {
      .playlist-header,
      .song-row {
        grid-template-columns: 56px 1fr 90px;
      }

      .col-artist,
      .song-meta {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 12px 290px;
      }

      .hero {
        padding: 18px 16px 16px;
      }

      h1 {
        font-size: 36px;
      }

      .section-title {
        font-size: 22px;
      }

      .bottom-player {
        width: calc(100vw - 18px);
        bottom: 10px;
        border-radius: 22px;
      }

      .bottom-track-title {
        font-size: 18px;
      }

      .ctrl-btn {
        width: 50px;
        height: 50px;
        font-size: 22px;
      }

      .ctrl-btn.play-main {
        width: 62px;
        height: 62px;
        font-size: 26px;
      }

      .playlist-list {
        max-height: calc(100vh - 330px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="/" class="back-link">← Ana Sayfa</a>
    </div>

    <div class="hero">
      <div class="eyebrow">Magical Memories</div>
      <h1>Büyülü Müzik Odası</h1>
      <div class="subtitle">
        Hatıraları melodilere dönüştürmek için hazırlandı.
      </div>

      <div class="playlist-shell">
        <div class="playlist-header">
          <div></div>
          <div>Başlık</div>
          <div class="col-artist">Sanatçı</div>
          <div style="text-align:right;">Süre</div>
        </div>
        <div class="playlist-list" id="playlistList"></div>
      </div>
    </div>
  </div>

  <div class="bottom-player">
    <div class="bottom-player-inner">
      <div class="bottom-track-title" id="bottomTrackTitle">Henüz şarkı seçilmedi</div>
      <div class="bottom-track-meta" id="bottomTrackMeta">Hazır</div>

      <div class="bottom-controls">
        <button class="ctrl-btn" id="prevBtn" title="Önceki" type="button">⏮</button>
        <button class="ctrl-btn play-main" id="playToggleBtn" title="Oynat / Duraklat" type="button">▶</button>
        <button class="ctrl-btn" id="nextBtn" title="Sonraki" type="button">⏭</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="time-row">
        <span id="timeCurrent">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>

      <div class="volume-strip">
        <button id="volumeDownBtn" class="vol-btn" type="button">−</button>
        <input
          id="volumeSlider"
          class="volume-slider"
          type="range"
          min="0"
          max="100"
          step="1"
          value="70"
        />
        <button id="volumeUpBtn" class="vol-btn" type="button">+</button>
      </div>
    </div>
  </div>

  <script>
    const playlistList = document.getElementById("playlistList");
    const bottomTrackTitle = document.getElementById("bottomTrackTitle");
    const bottomTrackMeta = document.getElementById("bottomTrackMeta");
    const progressFill = document.getElementById("progressFill");
    const timeCurrent = document.getElementById("timeCurrent");
    const timeTotal = document.getElementById("timeTotal");
    const volumeSlider = document.getElementById("volumeSlider");
    const playToggleBtn = document.getElementById("playToggleBtn");

    function formatTime(seconds) {
      const s = Number(seconds || 0);
      if (!Number.isFinite(s) || s < 0) return "0:00";
      const mins = Math.floor(s / 60);
      const secs = Math.floor(s % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function buildEq() {
      return `
        <span class="mini-eq">
          <span></span><span></span><span></span><span></span>
        </span>
      `;
    }

    let commandLocked = false;
    let lastCommandSignature = "";
    let unlockTimer = null;
    const COMMAND_LOCK_MS = 500;

    function makeCommandSignature(command, payload = {}) {
      return `${command}:${JSON.stringify(payload)}`;
    }

    function lockCommand(signature) {
      commandLocked = true;
      lastCommandSignature = signature;

      if (unlockTimer) {
        clearTimeout(unlockTimer);
      }

      unlockTimer = setTimeout(() => {
        commandLocked = false;
        lastCommandSignature = "";
        unlockTimer = null;
      }, COMMAND_LOCK_MS);
    }

    function shouldSkipCommand(command, payload = {}) {
      const signature = makeCommandSignature(command, payload);
      return commandLocked && signature === lastCommandSignature;
    }

    async function loadState() {
      const res = await fetch("/api/music/state");
      const data = await res.json();
      if (!data.ok) return;

      const playlist = data.playlist || [];
      const state = data.state || {};
      const activeIndex = Number(state.current_index || 0);

      playlistList.innerHTML = "";

      if (!playlist.length) {
        playlistList.innerHTML = `
          <div class="song-row">
            <div class="col-icon">♪</div>
            <div class="song-title">Henüz müzik yok</div>
            <div class="song-meta">—</div>
            <div class="song-duration">0:00</div>
          </div>
        `;
      } else {
        playlist.forEach((track, index) => {
          const name = track.name || "";
          const title = track.title || name;
          const artist = track.artist || "Mami Frame";
          const duration = Number(track.duration || 0);

          const row = document.createElement("div");
          row.className = index === activeIndex ? "song-row active" : "song-row";

          const isActive = index === activeIndex;
          const iconHtml = isActive && state.running && !state.pause
            ? buildEq()
            : `<button class="row-icon-btn" data-index="${index}" title="Seç">▶</button>`;

          row.innerHTML = `
            <div class="col-icon">${iconHtml}</div>
            <div class="song-title">${title}</div>
            <div class="song-meta">${artist}</div>
            <div class="song-duration">${formatTime(duration)}</div>
          `;
          playlistList.appendChild(row);
        });

        document.querySelectorAll(".row-icon-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const index = Number(btn.dataset.index);
            await sendCommand("select", { index });
          });
        });
      }

      const currentTitle = state.current_title || state.current_name || "Henüz şarkı seçilmedi";
      const currentArtist = state.current_artist || "Mami Frame";
      const playbackState = state.running
        ? (state.pause ? "Duraklatıldı" : "Çalıyor")
        : "Hazır";

      bottomTrackTitle.textContent = currentTitle;
      bottomTrackMeta.textContent = `${currentArtist} • ${playbackState}`;

      const duration = Number(state.duration || 0);
      const timePos = Number(state.time_pos || 0);
      const percent = duration > 0 ? Math.min(100, (timePos / duration) * 100) : 0;

      progressFill.style.width = `${percent}%`;
      timeCurrent.textContent = formatTime(timePos);
      timeTotal.textContent = formatTime(duration);

      if (state.running && !state.pause && percent > 0) {
        progressFill.classList.add("shimmering");
      } else {
        progressFill.classList.remove("shimmering");
      }

      volumeSlider.value = state.volume ?? 70;

      const isPlaying = state.running && !state.pause;
      playToggleBtn.dataset.state = isPlaying ? "playing" : "paused";
      playToggleBtn.textContent = isPlaying ? "⏸" : "▶";
    }

    async function sendCommand(command, payload = {}) {
      if (shouldSkipCommand(command, payload)) {
        return;
      }

      const signature = makeCommandSignature(command, payload);
      lockCommand(signature);

      try {
        await fetch("/api/music/command", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ command, payload })
        });
      } catch (error) {
        console.error("Command failed:", error);
      }

      setTimeout(loadState, 180);
    }

    document.getElementById("prevBtn").addEventListener("click", () => sendCommand("prev"));
    document.getElementById("nextBtn").addEventListener("click", () => sendCommand("next"));

    playToggleBtn.addEventListener("click", () => {
      const isPlaying = playToggleBtn.dataset.state === "playing";
      sendCommand(isPlaying ? "pause" : "play");
    });

    volumeSlider.addEventListener("change", () => {
      sendCommand("volume", { volume: Number(volumeSlider.value) });
    });

    document.getElementById("volumeDownBtn").addEventListener("click", () => {
      const next = Math.max(0, Number(volumeSlider.value) - 5);
      volumeSlider.value = next;
      sendCommand("volume", { volume: next });
    });

    document.getElementById("volumeUpBtn").addEventListener("click", () => {
      const next = Math.min(100, Number(volumeSlider.value) + 5);
      volumeSlider.value = next;
      sendCommand("volume", { volume: next });
    });

    loadState();
    setInterval(loadState, 1000);
  </script>
</body>
</html>
